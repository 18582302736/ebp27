<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图标生成器</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 40px; text-align: center; background: #f7faf5; }
    .preview { display: flex; gap: 24px; justify-content: center; margin: 24px 0; flex-wrap: wrap; }
    .preview div { text-align: center; }
    canvas { border: 1px solid #ddd; border-radius: 20px; }
    button {
      padding: 14px 40px; border-radius: 28px; background: #5b8c5a; color: #fff;
      border: none; font-size: 1rem; cursor: pointer; margin: 8px;
    }
    button:active { opacity: 0.8; }
    .info { color: #7a8b77; font-size: 0.85rem; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>图标生成器</h2>
  <p class="info">点击下方按钮生成并下载PNG图标文件</p>
  <div class="preview">
    <div>
      <canvas id="c192" width="192" height="192"></canvas>
      <p>192×192</p>
    </div>
    <div>
      <canvas id="c512" width="512" height="512"></canvas>
      <p>512×512</p>
    </div>
  </div>
  <button onclick="generate()">生成并下载图标</button>
  <p class="info">将下载的文件放入 /icons/ 目录</p>

  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#8cc88c"/>
          <stop offset="100%" style="stop-color:#5b8c5a"/>
        </linearGradient>
        <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffffff"/>
          <stop offset="100%" style="stop-color:#e8f3e5"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="128" fill="url(#bg)"/>
      <path d="M256 380 C256 380 160 320 160 240 C160 180 200 150 256 140 C256 140 240 220 240 260 C240 300 256 340 256 380Z" fill="url(#leaf)" opacity="0.95"/>
      <circle cx="310" cy="175" r="12" fill="#fff" opacity="0.7"/>
      <circle cx="340" cy="155" r="6" fill="#fff" opacity="0.5"/>
      <circle cx="295" cy="150" r="4" fill="#fff" opacity="0.4"/>
    </svg>`;

    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    drawIcon(document.getElementById('c192'), 192);
    drawIcon(document.getElementById('c512'), 512);

    function generate() {
      [192, 512].forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const blob = new Blob([svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        img.onload = () => {
          ctx.drawImage(img, 0, 0, size, size);
          canvas.toBlob(b => {
            const a = document.createElement('a');
            a.download = `icon-${size}.png`;
            a.href = URL.createObjectURL(b);
            a.click();
          });
          URL.revokeObjectURL(url);
        };
        img.src = url;
      });
    }
  </script>
</body>
</html>
