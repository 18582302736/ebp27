<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8cc88c"/>
      <stop offset="100%" style="stop-color:#5b8c5a"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8f3e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Leaf shape representing growth -->
  <path d="M256 380
           C256 380 160 320 160 240
           C160 180 200 150 256 140
           C256 140 240 220 240 260
           C240 300 256 340 256 380Z"
        fill="url(#leaf)" opacity="0.95"/>
  <!-- Small sparkle/star -->
  <circle cx="310" cy="175" r="12" fill="#fff" opacity="0.7"/>
  <circle cx="340" cy="155" r="6" fill="#fff" opacity="0.5"/>
  <circle cx="295" cy="150" r="4" fill="#fff" opacity="0.4"/>
</svg>