<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f7faf5">
  <title>27天情绪练习</title>
  <script>
    (function(){
      var t=localStorage.getItem('ebp_theme');
      if(!t) t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 9999; display: flex;
      align-items: center; justify-content: center; flex-direction: column;
      padding: 24px;
    }
    .lock-screen.hidden { display: none; }
    .lock-icon { font-size: 3rem; margin-bottom: 16px; }
    .lock-title { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .lock-sub { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px; text-align: center; }
    .lock-input {
      width: 100%; max-width: 280px; padding: 12px 16px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text);
      font-size: 1rem; text-align: center; font-family: inherit; letter-spacing: 4px;
      -webkit-text-security: disc;
    }
    .lock-input:focus { outline: none; border-color: var(--primary); }
    .lock-error { font-size: 0.78rem; color: #c62828; margin-top: 10px; min-height: 20px; }
    .lock-btn {
      margin-top: 14px; padding: 12px 48px; border-radius: 24px; background: var(--primary);
      color: #fff; border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .lock-btn:active { opacity: 0.8; }
    .lock-reset { font-size: 0.7rem; color: var(--text-muted); margin-top: 24px; cursor: pointer; background: none; border: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- 密码锁屏 -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-icon">🔒</div>
    <div class="lock-title" id="lockTitle">设置密码</div>
    <div class="lock-sub" id="lockSub">设置一个密码来保护你的隐私</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="输入密码" maxlength="20" autocomplete="off">
    <button class="lock-btn" id="lockBtn">确认</button>
    <div class="lock-error" id="lockError"></div>
    <button class="lock-reset" id="lockReset" style="display:none;">重置密码（会清除所有数据）</button>
  </div>

  <!-- 应用内容 -->
  <div id="appContent" class="hidden">
  <!-- 进入页 -->
  <div class="entry-page" id="entryPage" style="display:none;">
    <div class="entry-content">
      <img src="/assets/illustration.png" alt="治愈插图" class="entry-illustration">
      <h1 class="entry-title">27天情绪练习</h1>
      <p class="entry-desc">基于认知行为疗法与正念练习，<br>用27天，学会与情绪温柔相处。</p>
      <button class="entry-btn" id="startBtn">开始练习</button>
    </div>
  </div>

  <!-- 日历首页 -->
  <div class="calendar-page" id="calendarPage" style="display:none;">
    <header class="app-header">
      <h1 class="app-title">27天情绪练习</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="切换夜间模式">🌙</button>
    </header>

    <main>
      <div class="hero-illustration">
        <img src="/assets/illustration.png" alt="治愈插图" class="hero-img">
      </div>

      <section class="progress-section">
        <div class="progress-header">27天练习进度</div>
        <div class="progress-ring-container">
          <svg class="progress-ring" width="100" height="100" viewBox="0 0 100 100">
            <circle class="progress-ring-bg" cx="50" cy="50" r="44"/>
            <circle class="progress-ring-fill" id="progressRing" cx="50" cy="50" r="44"
              stroke-dasharray="276.46" stroke-dashoffset="276.46"/>
          </svg>
          <div class="progress-text">
            <div class="progress-num" id="progressNum">0/27</div>
            <div class="progress-label">已完成</div>
          </div>
        </div>
      </section>

      <section class="calendar-section">
        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <footer class="app-footer">
        每天一小步，慢慢来<br>你已经在路上了
      </footer>
    </main>
  </div>
  </div><!-- end appContent -->

  <script src="/js/utils.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/calendar.js"></script>
  <script src="/js/lock.js"></script>
  <script src="/js/app.js"></script>
  <script>
    initLockScreen();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
