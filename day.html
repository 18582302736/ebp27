<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#4a8b6f">
  <title>每日练习</title>
  <script>
    (function(){
      var t=localStorage.getItem('ebp_theme');
      if(!t) t=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
    })();
  </script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); z-index: 9999; display: flex;
      align-items: center; justify-content: center; flex-direction: column;
      padding: 24px;
    }
    .lock-screen.hidden { display: none; }
    .lock-icon { font-size: 3rem; margin-bottom: 16px; }
    .lock-title { font-size: 1.25rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .lock-sub { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 20px; text-align: center; }
    .lock-input {
      width: 100%; max-width: 280px; padding: 12px 16px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--bg-card); color: var(--text);
      font-size: 1rem; text-align: center; font-family: inherit; letter-spacing: 4px;
      -webkit-text-security: disc;
    }
    .lock-input:focus { outline: none; border-color: var(--primary); }
    .lock-error { font-size: 0.875rem; color: #c62828; margin-top: 10px; min-height: 20px; }
    .lock-btn {
      margin-top: 14px; padding: 12px 48px; border-radius: 24px; background: var(--primary);
      color: #fff; border: none; font-size: 1rem; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .lock-btn:active { opacity: 0.8; }
    .lock-reset { font-size: 0.7rem; color: var(--text-muted); margin-top: 24px; cursor: pointer; background: none; border: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- 密码锁屏 -->
  <div class="lock-screen" id="lockScreen">
    <div class="lock-icon">🔒</div>
    <div class="lock-title" id="lockTitle">需要密码</div>
    <div class="lock-sub" id="lockSub">输入密码以继续使用</div>
    <input type="password" class="lock-input" id="lockInput" placeholder="输入密码" maxlength="20" autocomplete="off">
    <button class="lock-btn" id="lockBtn">确认</button>
    <div class="lock-error" id="lockError"></div>
  </div>

  <div id="appContent" class="hidden">
  <header class="app-header">
    <a href="index.html" class="back-btn" style="margin:0;padding:0;">← 返回日历</a>
    <button class="theme-toggle" id="themeToggle" aria-label="切换夜间模式">🌙</button>
  </header>
  <main class="day-detail">
    <div class="day-theme" id="dayTheme"></div>
    <div class="day-subtitle" id="daySubtitle"></div>
    <div class="sensory-badge" id="sensoryBadge" style="display:none;"></div>
    <div class="task-list" id="taskList"></div>
    <div class="completion-banner" id="completionBanner">
      <div class="banner-icon">🎉</div>
      <div class="banner-text">太棒了！今日练习全部完成</div>
      <div class="banner-sub">你已经比昨天更了解自己了</div>
    </div>
    <a class="next-day-btn" id="nextDayBtn" href="#">进入下一天 →</a>
  </main>
  </div><!-- end appContent -->

  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/audio-player.js"></script>
  <script src="js/lock.js"></script>
  <script src="js/journal.js"></script>
  <script src="js/day.js"></script>
  <script>
    initLockScreen();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
